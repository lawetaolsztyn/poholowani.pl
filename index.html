<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poholowani.pl - Wykorzystaj puste przebiegi!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <h1>Wykorzystaj puste przebiegi!</h1>
        <p>Znajdź lub zaoferuj transport powrotny lawet i busów w całej Europie. Prosto i szybko!</p>
    </header>
    <div class="background-map"></div>
    <div class="central-buttons">
        <div>
            <button id="offer-transport-btn">OFERUJĘ TRANSPORT</button>
            <div class="button-subtitle"><b>JESTEM PRZEWOŹNIKIEM</b></div>
        </div>
        <div>
            <button id="search-transport-btn">SZUKAM TRANSPORTU</button>
            <div class="button-subtitle"><b>JESTEM KLIENTEM</b></div>
        </div>
    </div>
    <div id="map-container" class="hidden">
        <div id="transport-form" class="hidden">
            <h2>Dodaj swój przejazd</h2>
            </div>
        <div id="transport-list" class="hidden">
            <h2>Dostępne przejazdy</h2>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const offerTransportBtn = document.getElementById('offer-transport-btn');
    const searchTransportBtn = document.getElementById('search-transport-btn');
    const mapContainer = document.getElementById('map-container');
    const transportForm = document.getElementById('transport-form');
    const transportList = document.getElementById('transport-list');

    let mapInitialized = false;

    offerTransportBtn.addEventListener('click', function() {
        console.log('Kliknięto przycisk OFERUJĘ TRANSPORT (w HTML)');
        mapContainer.style.display = 'block';
        transportForm.classList.remove('hidden');
        transportList.classList.add('hidden');
        mapContainer.style.height = '100%'; // Upewnij się, że ta linia jest
        mapContainer.style.width = '100%';  // Upewnij się, że ta linia jest
        initMap();
        mapInitialized = true;
    });

    searchTransportBtn.addEventListener('click', function() {
        console.log('Kliknięto przycisk SZUKAM TRANSPORTU (w HTML)');
        mapContainer.style.display = 'block';
        transportList.classList.remove('hidden');
        transportForm.classList.add('hidden');
        mapContainer.style.height = '100%'; // Upewnij się, że ta linia jest
        mapContainer.style.width = '100%';  // Upewnij się, że ta linia jest
        initMap();
        mapInitialized = true;
    });
});

let map;

function initMap() {
    console.log('Funkcja initMap() została wywołana');
    const mapDiv = document.getElementById("map-container");
    map = new google.maps.Map(mapDiv, {
        center: { lat: 53.7797, lng: 20.4900 },
        zoom: 10,
        gestureHandling: 'greedy'
    });
}
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDRE07N_PgvsrB2fXzF5JbVJE9mgnf_Eag&callback=initMap"></script>
</body>
</html>
